# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: Release - Build, Test & Publish

on:
  release:
    types: [published]

jobs:
  # Job 1: Build and test application
  build-app:
    name: Build & Test Application
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    env:
      BUILD_CONFIG: "Release"
    outputs:
      version: ${{ steps.branch_name.outputs.value }}
      is_prerelease: ${{ steps.check_prerelease.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        shell: bash
        run: echo "value=$(echo ${GITHUB_REF#refs/tags/v})" >> $GITHUB_OUTPUT
        id: branch_name

      - name: Check if prerelease
        id: check_prerelease
        run: |
          if [[ "${{ steps.branch_name.outputs.value }}" == *"pre"* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Set vm.max_map_count for Elasticsearch
        run: sudo sysctl -w vm.max_map_count=262144

      - name: docker compose -f ./docker-compose/docker-compose.tests.yml up -d
        run: docker compose -f ./docker-compose/docker-compose.tests.yml up -d --wait

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration $BUILD_CONFIG -p:Version=${{ steps.branch_name.outputs.value }} --no-restore

      - name: Pack plugins for NuGet
        run: |
          while IFS= read -r project; do
            dotnet pack "$project" \
              --configuration $BUILD_CONFIG \
              --no-build \
              -p:Version=${{ steps.branch_name.outputs.value }} \
              -p:PackageVersion=${{ steps.branch_name.outputs.value }} \
              -p:IsPackable=true
          done < <(find ./plugins -name "*.csproj" -not -path "*/obj/*")

      - name: Test
        run: dotnet test --no-build --configuration $BUILD_CONFIG --logger "trx" --verbosity d --results-directory "./"

      - name: Publish Test Results
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: .NET Test Results
          path: "*.trx"
          reporter: dotnet-trx
          fail-on-error: false

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: "**/*.nupkg"
          retention-days: 1

  # Job 2: Build Docker images in parallel for each platform
  build-docker:
    name: Build Docker (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    needs: build-app
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU (only for cross-platform builds)
        if: matrix.platform != runner.arch
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_API_USERNAME }}
          password: ${{ secrets.DOCKER_API_KEY }}

      - name: Extract platform suffix
        id: platform
        run: |
          PLATFORM_PAIR=${{ matrix.platform }}
          PLATFORM_SUFFIX=${PLATFORM_PAIR//\//-}
          echo "suffix=${PLATFORM_SUFFIX}" >> $GITHUB_OUTPUT

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./
          file: src/LeadCMS/Dockerfile
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=leadcms/core,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=registry,ref=leadcms/core:buildcache-${{ steps.platform.outputs.suffix }}
          cache-to: type=registry,ref=leadcms/core:buildcache-${{ steps.platform.outputs.suffix }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ steps.platform.outputs.suffix }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Job 3: Merge manifests and create multi-platform image
  merge-docker:
    name: Create Multi-Platform Image
    runs-on: ubuntu-latest
    needs:
      - build-app
      - build-docker
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_API_USERNAME }}
          password: ${{ secrets.DOCKER_API_KEY }}

      - name: Create manifest list and push (stable release)
        if: ${{ needs.build-app.outputs.is_prerelease == 'false' }}
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            --tag leadcms/core:latest \
            --tag leadcms/core:${{ needs.build-app.outputs.version }} \
            $(printf 'leadcms/core@sha256:%s ' *)

      - name: Create manifest list and push (prerelease)
        if: ${{ needs.build-app.outputs.is_prerelease == 'true' }}
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            --tag leadcms/core:develop \
            --tag leadcms/core:${{ needs.build-app.outputs.version }} \
            $(printf 'leadcms/core@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect leadcms/core:${{ needs.build-app.outputs.version }}

  # Job 4: Publish to NuGet (can run in parallel with Docker merge)
  publish-nuget:
    name: Publish to NuGet
    runs-on: ubuntu-latest
    needs: build-app
    steps:
      - name: Download NuGet packages
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: ./packages

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish to NuGet
        run: dotnet nuget push ./packages/**/*.nupkg --source 'https://api.nuget.org/v3/index.json' --api-key ${{secrets.NUGET_API_KEY}} --skip-duplicate
