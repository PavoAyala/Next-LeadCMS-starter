name: Manual - Build, Test & Publish

on:
  workflow_dispatch:
    inputs:
      run_tests:
        description: "Run Tests"
        required: false
        default: true
        type: boolean
      version:
        description: "Release Version"
        required: true
        type: string

jobs:
  # Job 1a: Build frontend (runs in parallel with backend)
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout frontend (leadcms.admin)
        uses: actions/checkout@v4
        with:
          repository: LeadCMS/leadcms.admin
          ref: develop

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: "npm"

      - name: Set frontend environment variables
        run: |
          echo "TINYMCE_API_KEY=${{ secrets.TINYMCE_API_KEY }}" > ./.env
          echo "VERSION=${{ github.event.inputs.version }}" >> ./.env

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 1

  # Job 1b: Build and test backend (runs in parallel with frontend)
  build-backend:
    name: Build & Test Backend
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    env:
      BUILD_CONFIG: "Release"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: "develop"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Set vm.max_map_count for Elasticsearch
        if: ${{ github.event.inputs.run_tests == 'true' }}
        run: sudo sysctl -w vm.max_map_count=262144

      - name: Docker Compose Setup
        if: ${{ github.event.inputs.run_tests == 'true' }}
        run: docker compose -f ./docker-compose/docker-compose.tests.yml up -d --wait

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration $BUILD_CONFIG -p:Version=${{ github.event.inputs.version }} --no-restore

      - name: Pack plugins for NuGet
        run: |
          while IFS= read -r project; do
            dotnet pack "$project" \
              --configuration $BUILD_CONFIG \
              --no-build \
              -p:Version=${{ github.event.inputs.version }} \
              -p:PackageVersion=${{ github.event.inputs.version }} \
              -p:IsPackable=true
          done < <(find ./plugins -name "*.csproj" -not -path "*/obj/*")

      - name: Test
        if: ${{ github.event.inputs.run_tests == 'true' }}
        run: dotnet test --no-build --configuration $BUILD_CONFIG --logger "trx" --verbosity normal --results-directory "./"

      - name: Publish Test Results
        if: github.event.inputs.run_tests == 'true' && (success() || failure())
        uses: dorny/test-reporter@v1
        with:
          name: .NET Test Results
          path: "*.trx"
          reporter: dotnet-trx
          fail-on-error: false

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: "**/*.nupkg"
          retention-days: 1

  # Job 2: Build Docker images in parallel for each platform
  build-docker:
    name: Build Docker (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    needs: [build-frontend, build-backend]
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: "develop"

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: ./src/LeadCMS/wwwroot

      - name: Set up QEMU (only for cross-platform builds)
        if: matrix.platform != runner.arch
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_API_USERNAME }}
          password: ${{ secrets.DOCKER_API_KEY }}

      - name: Extract platform suffix
        id: platform
        run: |
          PLATFORM_PAIR=${{ matrix.platform }}
          PLATFORM_SUFFIX=${PLATFORM_PAIR//\//-}
          echo "suffix=${PLATFORM_SUFFIX}" >> $GITHUB_OUTPUT

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./
          file: src/LeadCMS/Dockerfile
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=leadcms/core,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=registry,ref=leadcms/core:buildcache-${{ steps.platform.outputs.suffix }}
          cache-to: type=registry,ref=leadcms/core:buildcache-${{ steps.platform.outputs.suffix }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ steps.platform.outputs.suffix }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Job 3: Merge manifests and create multi-platform image
  merge-docker:
    name: Create Multi-Platform Image
    runs-on: ubuntu-latest
    needs: build-docker
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_API_USERNAME }}
          password: ${{ secrets.DOCKER_API_KEY }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            --tag leadcms/core:develop \
            --tag leadcms/core:${{ github.event.inputs.version }} \
            $(printf 'leadcms/core@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect leadcms/core:develop
          docker buildx imagetools inspect leadcms/core:${{ github.event.inputs.version }}

  # Job 4: Publish to NuGet (can run in parallel with Docker merge)
  publish-nuget:
    name: Publish to NuGet
    runs-on: ubuntu-latest
    needs: build-backend
    steps:
      - name: Download NuGet packages
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: ./packages

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish to NuGet
        run: dotnet nuget push ./packages/**/*.nupkg --source 'https://api.nuget.org/v3/index.json' --api-key ${{secrets.NUGET_API_KEY}} --skip-duplicate
